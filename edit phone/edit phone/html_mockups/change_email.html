<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เปลี่ยนอีเมล</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container" style="background-color: #ffffff; min-height: 100vh; padding: 0;">
    <div class="form-container" style="padding: 20px 24px;">
      <a href="edit_basic_info.html" style="display: inline-block; margin-bottom: 35px; color: #111; text-decoration: none;">
        <span class="material-symbols-outlined" style="font-size: 24px; font-weight: bold;">chevron_left</span>
      </a>
      
      <h1 class="form-title" style="font-size: 22px; font-weight: 700; color: #1a1a1a; margin: 0 0 15px;">
        เปลี่ยนอีเมล
      </h1>
      <p class="form-desc" style="font-size: 15px; color: #333; margin-bottom: 2px; font-weight: 500;">
        กรุณากรอกอีเมลใหม่ของคุณ
      </p>
      <p class="form-note" style="font-size: 12px; color: #666; margin-bottom: 35px;">
        *ระบบจะส่ง OTP ไปยังอีเมลใหม่เพื่อยืนยัน
      </p>

      <div class="input-group" style="margin-bottom: 25px; position: relative;">
        <div class="input-label" style="position: absolute; font-size: 11px; color: #666; top: 10px; left: 16px; z-index: 1;">
          อีเมล ปัจจุบัน
        </div>
        <input 
          type="email" 
          id="currentEmailInput"
          class="custom-input disabled-input" 
          value="charukitsp@gmail.com" 
          readonly 
          style="width: 100%; padding: 28px 15px 10px; background-color: #f6f6f9; border: 1px solid #e8e8e8; border-radius: 12px; font-size: 16px; color: #888; outline: none; font-weight: 400;" 
        />
      </div>

      <div class="input-group" style="margin-bottom: 45px; position: relative;">
        <input 
          type="email" 
          id="newEmailInput"
          class="custom-input" 
          placeholder="อีเมล ใหม่" 
          style="width: 100%; padding: 18px 16px; background-color: #fff; border: 1px solid #d1d1d1; border-radius: 12px; font-size: 16px; color: #333; outline: none;" 
        />
      </div>

      <a href="#" onclick="saveEmailAndProceed(event)" style="text-decoration: none; display: block;">
        <button class="primary-btn" style="width: 100%; padding: 16px; background-color: #84328f; color: #fff; border: none; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer;">
          ยืนยัน
        </button>
      </a>
    </div>
  </div>

  <script>
    function saveEmailAndProceed(e) {
      e.preventDefault();
      const emailInput = document.getElementById('newEmailInput');
      const email = emailInput ? emailInput.value.trim() : '';
      if (email) {
        sessionStorage.setItem('newEmail', email);
      }
      window.location.href = 'otp_confirm_email.html';
    }

    window.addEventListener('DOMContentLoaded', () => {
      const updatedEmail = sessionStorage.getItem('updatedEmail');
      if (updatedEmail) {
        document.getElementById('currentEmailInput').value = updatedEmail;
      }
    });
  </script>
</body>
</html>
